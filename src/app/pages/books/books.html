<h2>Books</h2>

<p>Total books: {{ books.length }}</p>

<ul>
  <li *ngFor="let book of books">

    <strong>{{ book.title }}</strong>

    <br>

    {{ book.author }}

    <br><br>

    <button
        [routerLink]="['/edit-book', book._id]">
        Edit
    </button>

    <button
        (click)="deleteBook(book._id)">
        Delete
    </button>

    <hr>

</li>
</ul>

<button routerLink="/add-book">
  Add New Book
</button>
