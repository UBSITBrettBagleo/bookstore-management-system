<h2>Books</h2>

<input
    type="text"
    placeholder="Search books..."
    [(ngModel)]="searchText">

<br><br>

<label><strong>Genre:</strong></label>

<select [(ngModel)]="selectedGenre">

  @for (genre of genres; track genre) {

    <option [value]="genre">
      {{ genre }}
    </option>

  }

</select>

<p>Total books: {{ filteredBooks().length }}</p>

<div *ngFor="let book of filteredBooks()">

    <img
        *ngIf="book.coverImage"
        [src]="book.coverImage"
        width="120"
        alt="Book Cover">

    <h3>{{ book.title }}</h3>

    <p><strong>Author:</strong> {{ book.author }}</p>

    <p><strong>Genre:</strong> {{ book.genre }}</p>

    <p><strong>Price:</strong> ₱{{ book.price }}</p>

    <p><strong>Stock:</strong> {{ book.stock }}</p>

    <p><strong>Synopsis:</strong> {{ book.description }}</p>
    

    <button
        [routerLink]="['/edit-book', book._id]">
        ✏️Edit
    </button>

    <button
        (click)="deleteBook(book._id)">
        🗑️Delete
    </button>

    <hr>

</div>

<br>

<button routerLink="/add-book">
    Add New Book
</button>
