<h2>Add New Book</h2>

<label>Title</label><br>
<input type="text" [(ngModel)]="book.title">
<br><br>

<label>Author</label><br>
<input type="text" [(ngModel)]="book.author">
<br><br>

<label>Genre</label><br>
<input type="text" [(ngModel)]="book.genre">
<br><br>

<label>Price</label><br>
<input type="number" [(ngModel)]="book.price">
<br><br>

<label>Stock</label><br>
<input type="number" [(ngModel)]="book.stock">
<br><br>

<label>Cover Image URL</label><br>
<input type="text" [(ngModel)]="book.coverImage">
<br><br>

<button (click)="addBook()">
    Add Book
</button>
